<div class="modal-overlay" (click)="cancel.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editingCard?.id ? 'Edit Card' : 'New Card' }}</h2>
      <button class="close-btn" (click)="cancel.emit()">×</button>
    </div>
    <div class="modal-body">
      <form (ngSubmit)="save.emit()">
        <div class="form-group">
          <label for="title">Title *</label>
          <input
            id="title"
            type="text"
            [(ngModel)]="card.title"
            name="title"
            [required]="true"
            placeholder="Enter task title"
          />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            [(ngModel)]="card.description"
            name="description"
            rows="4"
            placeholder="Enter task description"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="priority">Priority</label>
          <select
            id="priority"
            [(ngModel)]="card.priority"
            name="priority"
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="form-group">
          <label for="assignee">Assignee</label>
          <input
            id="assignee"
            type="text"
            [(ngModel)]="card.assignee"
            name="assignee"
            placeholder="John Doe"
          />
        </div>

        <div class="form-group">
          <label for="tags">Tags (comma-separated)</label>
          <input
            id="tags"
            type="text"
            [(ngModel)]="tagsInput"
            name="tags"
            placeholder="feature, bug, design"
          />
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="cancel.emit()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            {{ editingCard?.id ? 'Save Changes' : 'Create Card' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
