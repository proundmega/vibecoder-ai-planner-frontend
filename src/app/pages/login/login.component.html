<div class="login-container">
  <div class="login-box">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <form (ngSubmit)="login()" class="login-form" [class.error]="">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          required
          [class.focused]="username.length > 0"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
          [class.focused]="password.length > 0"
        />
      </div>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="!username || !password || errorMessage">
          Sign In
        </button>
      </div>

      <p class="signup-link">
        Don't have an account? <a routerLink="/register">Register here</a>
      </p>
    </form>

    <div class="plans-preview">
      <h3>Choose your plan</h3>
      <div class="plans-grid">
        <div class="plan-card" *ngFor="let plan of getDisplayPlans()">
          <h4>{{ plan | uppercase }}</h4>
          <p>{{ plan === 'free' ? 'Basic features' : plan === 'pro' ? 'Advanced features' : 'All features' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
